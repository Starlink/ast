name: Build

on:
  push:
    branches: [master]
    tags: '*'
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      make_flags:
        description: Extra flags to pass to make
        required: false

jobs:
  build-and-test:
    name: Build and run `make check`
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            cc: clang
          - os: ubuntu-latest
            cc: gcc

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: true

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            libtool \
            build-essential

          if [ "${{ matrix.cc }}" = "clang" ]; then
            sudo apt-get install -y clang
          fi

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install \
            autoconf \
            automake \
            libtool

      - name: Setup ccache action
        uses: Chocobo1/setup-ccache-action@v1.5.1

      - name: Bootstrap autotools
        run: ./bootstrap.local

      - name: Configure
        run: |
          ./configure CC=${{ matrix.cc }}

      # If make fails re-run with V=1 so we can inspect
      - name: Build
        run: |
          make ${{ github.event.inputs.make_flags }} || \
          make ${{ github.event.inputs.make_flags }} V=1

      - name: Check
        run: make check ${{ github.event.inputs.make_flags }}

      - name: Output test logs on failure
        if: failure()
        run: |
          tail -n +1 ast_tester/*.log ast_tests/*.log
