name: CMake Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Release]
        shared_libs: [ON, OFF]
        fortran: [OFF]
        sanitizers: [OFF]
        simd: [OFF]
        include:
          # Add a Fortran build on each platform (shared only)
          - os: ubuntu-latest
            build_type: Release
            shared_libs: ON
            fortran: ON
            sanitizers: OFF
            simd: OFF
          - os: macos-latest
            build_type: Release
            shared_libs: ON
            fortran: ON
            sanitizers: OFF
            simd: OFF
          # Debug builds with sanitizers
          - os: ubuntu-latest
            build_type: Debug
            shared_libs: ON
            fortran: OFF
            sanitizers: ON
            simd: OFF
          - os: macos-latest
            build_type: Debug
            shared_libs: ON
            fortran: OFF
            sanitizers: ON
            simd: OFF
          # SIMD build (Ubuntu + GCC, Release). Exercises AST_ENABLE_SIMD.
          # The code is compiled for x86-64-v3 (AVX2) with no runtime fallback,
          # so it needs an AVX2-capable runner; GitHub's hosted x86-64 Linux
          # runners (AMD EPYC) seem to provide AVX2 in practice; reference:
          # https://runs-on.com/benchmarks/github-actions-cpu-performance/
          - os: ubuntu-latest
            build_type: Release
            shared_libs: ON
            fortran: OFF
            sanitizers: OFF
            simd: ON

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libyaml-dev gfortran libplplot-dev plplot-driver-cairo

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libyaml gcc plplot

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DBUILD_SHARED_LIBS=${{ matrix.shared_libs }}
          -DAST_BUILD_FORTRAN=${{ matrix.fortran }}
          -DAST_ENABLE_SANITIZERS=${{ matrix.sanitizers }}
          -DAST_ENABLE_SIMD=${{ matrix.simd }}
          -DAST_C_STANDARD=11

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --output-junit build/junit.xml

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          files: build/junit.xml
          report_type: test_results
          fail_ci_if_error: true
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
