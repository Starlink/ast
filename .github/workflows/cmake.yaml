name: CMake Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Release]
        shared_libs: [ON, OFF]
        fortran: [OFF]
        sanitizers: [OFF]
        yaml_backend: [yaml, fyaml]
        c_flags: ['']
        include:
          # x86-64-v3 (Haswell+, 2013: AVX2/FMA) build.  Baseline x86-64
          # has no FMA instruction, so compilers round a*b+c twice, while
          # arm64 (and v3) contract to a fused multiply-add by default.
          # This job makes contraction-driven differences in the transform
          # oracle show up as baseline-vs-v3 on the same OS/libm, rather
          # than only as ubuntu-vs-macos where libm differences are also
          # in play.  See ast_tester/gen_transform_oracle.c.
          - os: ubuntu-latest
            build_type: Release
            shared_libs: ON
            fortran: OFF
            sanitizers: OFF
            yaml_backend: yaml
            c_flags: '-march=x86-64-v3'
          # Add a Fortran build on each platform (shared only)
          - os: ubuntu-latest
            build_type: Release
            shared_libs: ON
            fortran: ON
            sanitizers: OFF
            yaml_backend: yaml
          - os: macos-latest
            build_type: Release
            shared_libs: ON
            fortran: ON
            sanitizers: OFF
            yaml_backend: yaml
          # Debug builds with sanitizers
          - os: ubuntu-latest
            build_type: Debug
            shared_libs: ON
            fortran: OFF
            sanitizers: ON
            yaml_backend: yaml
          - os: macos-latest
            build_type: Debug
            shared_libs: ON
            fortran: OFF
            sanitizers: ON
            yaml_backend: yaml
          # Debug builds with libfyaml
          - os: ubuntu-latest
            build_type: Debug
            shared_libs: ON
            fortran: OFF
            sanitizers: OFF
            yaml_backend: fyaml
          - os: macos-latest
            build_type: Debug
            shared_libs: ON
            fortran: OFF
            sanitizers: OFF
            yaml_backend: fyaml

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libyaml-dev libfyaml-dev gfortran libplplot-dev plplot-driver-cairo

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libyaml libfyaml gcc plplot

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DBUILD_SHARED_LIBS=${{ matrix.shared_libs }}
          -DAST_BUILD_FORTRAN=${{ matrix.fortran }}
          -DAST_ENABLE_SANITIZERS=${{ matrix.sanitizers }}
          -DAST_YAML_BACKEND=${{ matrix.yaml_backend }}
          -DAST_C_STANDARD=11
          "-DCMAKE_C_FLAGS=${{ matrix.c_flags }}"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --output-junit build/junit.xml

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          files: build/junit.xml
          report_type: test_results
          fail_ci_if_error: true
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
